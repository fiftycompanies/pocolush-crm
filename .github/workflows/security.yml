name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, staging]
  schedule:
    # 매주 월요일 KST 10:00 (UTC 01:00)
    - cron: "7 1 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: npm audit (critical/high 실패, moderate 경고만)
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 전체 히스토리

      # push to main 시 base=main, head=HEAD 가 같은 commit 으로 resolve 되어
      # "BASE and HEAD commits are the same" 으로 즉시 실패 (0s).
      # 이벤트별 base 분기:
      #   - pull_request: base.sha (PR target branch tip)
      #   - push: event.before (직전 commit)
      #   - schedule/manual: 미설정 (TruffleHog 자체 기본값 — 최근 한 commit)
      - name: TruffleHog OSS (PR)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog OSS (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

      # 첫 push (before == 0000...) 또는 schedule/manual 트리거 시 전체 스캔
      - name: TruffleHog OSS (full)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000')
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
