name: E2E Full

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      base_url:
        description: "PLAYWRIGHT_BASE_URL (staging/prod)"
        required: true
        default: "http://localhost:3000"

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e-full:
    name: Playwright Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON }}

      - name: Start server
        run: npm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SRK }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Playwright test (shard ${{ matrix.shard }}/3)
        run: npx playwright test --shard=${{ matrix.shard }}/3
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}
          ALLOW_PROD_WRITE: "no"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SRK }}

      - name: Upload trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 14

      - name: Post-job cleanup (test DB)
        if: always()
        run: |
          if [ -f e2e/helpers/nuclear-cleanup.js ]; then
            node e2e/helpers/nuclear-cleanup.js
          fi
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SRK }}
