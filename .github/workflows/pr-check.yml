name: PR Check

on:
  pull_request:
    branches: [main, staging]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "types/**"
      - "e2e/**"
      - "supabase/migrations/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "playwright.config.ts"

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  e2e-smoke:
    name: E2E Smoke (@smoke 태그)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON }}

      - name: Playwright smoke (SP-01/03/07만)
        run: npx playwright test --grep @smoke
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          ALLOW_PROD_WRITE: "no"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SRK }}

      - name: Upload trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-smoke
          path: test-results/
          retention-days: 7
